name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build Windows executable
        run: uv run python scripts/build_exe.py

      - uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: dist/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 fuse libfuse2 \
            libxcb-shape0 libxcb-xkb1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-image0 libxcb-randr0 libxcb-render-util0 libfontconfig1 libdbus-1-3 \
            libglib2.0-0 libtiff5 || sudo apt-get install -y libtiff6

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build AppImage
        run: uv run bash scripts/build_appimage.sh

      - uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  build-termux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Termux .deb package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python3 - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"

          PACKAGE_NAME="devinstaller"
          PREFIX="/data/data/com.termux/files/usr"
          STAGING_ROOT="$RUNNER_TEMP/${PACKAGE_NAME}-termux"
          PACKAGE_ROOT="$STAGING_ROOT/${PACKAGE_NAME}"
          INSTALL_ROOT="$PACKAGE_ROOT${PREFIX}"
          LIB_ROOT="$INSTALL_ROOT/lib/${PACKAGE_NAME}"

          rm -rf "$STAGING_ROOT"
          mkdir -p "$PACKAGE_ROOT/DEBIAN" "$INSTALL_ROOT/bin" "$LIB_ROOT" dist

          cp -r src/udm "$LIB_ROOT/"
          cp tools.json "$LIB_ROOT/tools.json"

          cat >"$INSTALL_ROOT/bin/devinstaller" <<EOF
          #!/data/data/com.termux/files/usr/bin/sh
          export PYTHONPATH="$PREFIX/lib/$PACKAGE_NAME\${PYTHONPATH:+:\$PYTHONPATH}"
          exec $PREFIX/bin/python -m udm "\$@"
          EOF
          chmod 755 "$INSTALL_ROOT/bin/devinstaller"

          cat >"$PACKAGE_ROOT/DEBIAN/control" <<EOF
          Package: $PACKAGE_NAME
          Version: $VERSION
          Architecture: all
          Maintainer: GeneralKaos666 <GeneralKaos666@users.noreply.github.com>
          Installed-Size: $(du -sk "$INSTALL_ROOT" | cut -f1)
          Depends: python
          Homepage: https://github.com/${{ github.repository }}
          Section: utils
          Priority: optional
          Description: DevInstaller for Termux
           Cross-platform developer tool installer with a Termux-friendly CLI.
          EOF

          dpkg-deb --root-owner-group --build \
            "$PACKAGE_ROOT" \
            "dist/${PACKAGE_NAME}_${VERSION}_all.deb"

      - uses: actions/upload-artifact@v7
        with:
          name: termux-deb
          path: dist/*.deb
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build DMG
        run: uv run bash scripts/build_dmg.sh

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.head_commit.message, 'release:')
    needs: [build-windows, build-linux, build-termux-deb, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Determine Tag Name
        id: determine_tag
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" =~ ^release:[[:space:]]*([0-9\.]+[A-Za-z0-9\-]*) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            artifacts/windows-exe/*
            artifacts/linux-appimage/*
            artifacts/termux-deb/*
            artifacts/macos-dmg/*
          generate_release_notes: true
